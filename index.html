<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>FieldsEG Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f4f7f6;
        }

        .sidebar {
            width: 240px;
            background: #2c3e50;
            color: #fff;
            padding: 20px;
            box-sizing: border-box;
        }

        .sidebar h3 {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #34495e;
            padding-bottom: 10px;
        }

        .sidebar a {
            display: block;
            margin: 15px 0;
            cursor: pointer;
            color: #bdc3c7;
            text-decoration: none;
            padding: 10px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .sidebar a:hover {
            color: #fff;
            background: #34495e;
        }

        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .charts-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
        }

        .chart-container {
            flex: 1;
            min-width: 280px;
            max-width: 400px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .stats-summary {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }
        .stat-item {
            background: #ecf0f1;
            padding: 15px 25px;
            border-radius: 6px;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #3498db;
            color: #fff;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border: 1px solid #eee;
        }

        button {
            padding: 8px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }

        .btn-add { background: #27ae60; color: #fff; }
        .btn-del { background: #e74c3c; color: #fff; }

        input {
            padding: 10px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Cairo';
        }

        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            font-weight: bold;
            display: inline-block;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>FieldsEG</h3>
    <a onclick="showSection('home')">🏠 الرئيسية</a>
    <a onclick="showSection('users')">👥 المستخدمين</a>
    <a onclick="showSection('comments')">💬 التعليقات</a>
    <a onclick="showSection('stats')">📊 البيانات الهيكلية</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HOME -->
    <div id="homeSection" class="card">
        <h2>لوحة التحكم الإحصائية</h2>

        <button class="btn-add" id="btnRefresh" onclick="loadData()">🔄 تحديث البيانات من السيرفر</button>

        <div class="stats-summary">
            <div class="stat-item">إجمالي المستخدمين: <strong id="usersCount">0</strong></div>
            <div class="stat-item">إجمالي التعليقات: <strong id="commentsCount">0</strong></div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <canvas id="chartMain"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="chartPie"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="chartUsersComments"></canvas>
            </div>
        </div>
    </div>

    <!-- USERS -->
    <div id="usersSection" class="card" style="display:none;">
        <h3>إدارة المستخدمين</h3>
        <input id="newUserName" placeholder="اسم المستخدم الجديد">
        <button class="btn-add" onclick="addUser()">إضافة +</button>
        <table id="usersTable"></table>
    </div>

    <!-- COMMENTS -->
    <div id="commentsSection" class="card" style="display:none;">
        <h3>إدارة التعليقات</h3>
        <input id="commentName" placeholder="اسم المستخدم المسجل">
        <input id="commentText" placeholder="نص التعليق">
        <button class="btn-add" onclick="addComment()">إضافة +</button>
        <table id="commentsTable"></table>
    </div>

    <!-- STATS -->
    <div id="statsSection" class="card" style="display:none;">
        <h3>بيانات النظام الجغرافية واللاعبين</h3>

        <div class="form-group">
            <label>🏘️ عدد القرى</label><br>
            <input type="number" id="villages" placeholder="أدخل عدد القرى">
        </div>

        <div class="form-group">
            <label>🏢 عدد المراكز</label><br>
            <input type="number" id="centers" placeholder="أدخل عدد المراكز">
        </div>

        <div class="form-group">
            <label>🌍 عدد المحافظات</label><br>
            <input type="number" id="governorates" placeholder="أدخل عدد المحافظات">
        </div>

        <div class="form-group">
            <label>⚽ عدد اللاعبين</label><br>
            <input type="number" id="players" placeholder="أدخل عدد اللاعبين">
        </div>

        <div class="form-group">
            <label>👤 المستخدمين المتوقعين</label><br>
            <input type="number" id="expectedUsers" placeholder="أدخل العدد المتوقع">
        </div>

        <br>
        <button class="btn-add" onclick="saveStats()">💾 حفظ البيانات</button>

        <h4>📌 البيانات الحالية المحفوظة:</h4>
        <div id="statsDisplay"></div>
    </div>

</div>

<script>
let allUsers = [], allComments = [], statsData = {};
let mainChart, pieChart, userChart;

const USERS_API = 'https://69dcf96584f912a264048d0a.mockapi.io/fields/users';
const COMMENTS_API = 'https://69dcf96584f912a264048d0a.mockapi.io/fields/comments';
const STATS_API = 'https://69ed5cefaf4ff533142bb99b.mockapi.io/organizationData';

/* ================= LOAD DATA WITH ERROR HANDLING ================= */
async function loadData() {
    const btn = document.getElementById('btnRefresh');
    btn.innerText = "⏳ جاري التحميل...";
    btn.disabled = true;

    try {
        const [resUsers, resComments, resStats] = await Promise.all([
            fetch(USERS_API).then(r => r.json()),
            fetch(COMMENTS_API).then(r => r.json()),
            fetch(STATS_API).then(r => r.json())
        ]);

        allUsers = Array.isArray(resUsers) ? resUsers : [];
        allComments = Array.isArray(resComments) ? resComments : [];
        statsData = (Array.isArray(resStats) && resStats.length > 0) ? resStats[0] : {};

        updateCounts();
        renderUsers();
        renderComments();
        renderStats();
    } catch (error) {
        console.error("Error fetching data:", error);
        alert("حدث خطأ أثناء جلب البيانات من السيرفر، يرجى التحقق من الروابط.");
    } finally {
        btn.innerText = "🔄 تحديث البيانات";
        btn.disabled = false;
    }
}

/* ================= COUNTS ================= */
function updateCounts() {
    document.getElementById('usersCount').innerText = allUsers.length;
    document.getElementById('commentsCount').innerText = allComments.length;
    drawCharts();
}

/* ================= CHARTS ================= */
function drawCharts() {
    if (mainChart) mainChart.destroy();
    if (pieChart) pieChart.destroy();
    if (userChart) userChart.destroy();

    /* BAR CHART */
    mainChart = new Chart(document.getElementById("chartMain"), {
        type: "bar",
        data: {
            labels: ["المحافظات", "المراكز", "القرى"],
            datasets: [{
                label: 'التوزيع الجغرافي',
                data: [
                    Number(statsData.governrates) || 0,
                    Number(statsData.centers) || 0,
                    Number(statsData.villages) || 0
                ],
                backgroundColor: ["#3498db", "#2ecc71", "#f39c12"]
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });

    /* PIE CHART 1 */
    pieChart = new Chart(document.getElementById("chartPie"), {
        type: "pie",
        data: {
            labels: ["اللاعبين", "المستخدمين المتوقعين"],
            datasets: [{
                data: [
                    Number(statsData.players) || 0,
                    Number(statsData.predicted_users) || 0
                ],
                backgroundColor: ["#9b59b6", "#e74c3c"]
            }]
        },
        options: { responsive: true }
    });

    /* PIE CHART 2 */
    userChart = new Chart(document.getElementById("chartUsersComments"), {
        type: "pie",
        data: {
            labels: ["المستخدمين الحاليين", "التعليقات"],
            datasets: [{
                data: [allUsers.length, allComments.length],
                backgroundColor: ["#3498db", "#f1c40f"]
            }]
        },
        options: { responsive: true }
    });
}

/* ================= NAV ================= */
function showSection(sec) {
    ["homeSection", "usersSection", "commentsSection", "statsSection"]
        .forEach(s => document.getElementById(s).style.display = "none");

    document.getElementById(sec + "Section").style.display = "block";
}

/* ================= USERS WITH DUPLICATION CHECK ================= */
function renderUsers() {
    let t = document.getElementById('usersTable');
    t.innerHTML = "<tr><th>المعرف (ID)</th><th>الاسم</th><th>حذف</th></tr>";

    allUsers.forEach(u => {
        t.innerHTML += `
        <tr>
            <td>${u.id}</td>
            <td>${u.name}</td>
            <td><button class="btn-del" onclick="deleteUser('${u.id}')">❌</button></td>
        </tr>`;
    });
}

async function addUser() {
    let input = document.getElementById('newUserName');
    let name = input.value.trim();
    if (!name) return;

    // التحقق من تكرار الاسم
    let isDuplicate = allUsers.some(user => user.name.trim().toLowerCase() === name.toLowerCase());

    if (isDuplicate) {
        alert("⚠️ هذا المستخدم موجود بالفعل!");
        return; 
    }

    try {
        let res = await fetch(USERS_API, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({name})
        });
        let newUser = await res.json();
        allUsers.push(newUser);
        input.value = "";
        updateCounts();
        renderUsers();
    } catch(e) { alert("فشلت عملية الإضافة"); }
}

async function deleteUser(id) {
    if(!confirm("هل أنت متأكد من حذف هذا المستخدم؟")) return;
    try {
        await fetch(`${USERS_API}/${id}`, {method:"DELETE"});
        allUsers = allUsers.filter(u => u.id !== id);
        updateCounts();
        renderUsers();
    } catch(e) { alert("فشلت عملية الحذف"); }
}

/* ================= COMMENTS WITH USER EXISTENCE CHECK ================= */
function renderComments() {
    let t = document.getElementById('commentsTable');
    t.innerHTML = "<tr><th>الاسم</th><th>التعليق</th><th>حذف</th></tr>";

    allComments.forEach(c => {
        t.innerHTML += `
        <tr>
            <td>${c.name}</td>
            <td>${c.text}</td>
            <td><button class="btn-del" onclick="deleteComment('${c.id}')">❌</button></td>
        </tr>`;
    });
}

async function addComment() {
    let nameInput = document.getElementById('commentName');
    let textInput = document.getElementById('commentText');
    let name = nameInput.value.trim();
    let text = textInput.value.trim();

    if (!name || !text) return;

    // التحقق من أن كاتب التعليق مسجل في قائمة المستخدمين
    let userExists = allUsers.some(user => user.name.trim().toLowerCase() === name.toLowerCase());

    if (!userExists) {
        alert("⚠️ لا يمكن إضافة التعليق! هذا المستخدم غير مسجل في النظام.");
        return; // منع الإرسال للسيرفر
    }

    try {
        let res = await fetch(COMMENTS_API, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({name, text})
        });
        allComments.push(await res.json());
        nameInput.value = "";
        textInput.value = "";
        updateCounts();
        renderComments();
    } catch(e) { alert("فشلت إضافة التعليق"); }
}

async function deleteComment(id) {
    if(!confirm("هل تريد حذف التعليق؟")) return;
    try {
        await fetch(`${COMMENTS_API}/${id}`, {method:"DELETE"});
        allComments = allComments.filter(c => c.id !== id);
        updateCounts();
        renderComments();
    } catch(e) { alert("فشلت عملية الحذف"); }
}

/* ================= STATS ================= */
function renderStats() {
    document.getElementById('villages').value = statsData.villages || "";
    document.getElementById('centers').value = statsData.centers || "";
    document.getElementById('governorates').value = statsData.governrates || "";
    document.getElementById('players').value = statsData.players || "";
    document.getElementById('expectedUsers').value = statsData.predicted_users || "";

    document.getElementById('statsDisplay').innerHTML = `
        <p>🏘️ القرى: ${statsData.villages || 0}</p>
        <p>🏢 المراكز: ${statsData.centers || 0}</p>
        <p>🌍 المحافظات: ${statsData.governrates || 0}</p>
        <p>⚽ اللاعبين المتاحين: ${statsData.players || 0}</p>
        <p>👤 المستخدمين المتوقعين: ${statsData.predicted_users || 0}</p>
    `;
}

/* ================= SAVE STATS ================= */
async function saveStats() {
    let data = {
        villages: document.getElementById('villages').value,
        centers: document.getElementById('centers').value,
        governrates: document.getElementById('governorates').value,
        players: document.getElementById('players').value,
        predicted_users: document.getElementById('expectedUsers').value
    };

    try {
        if (!statsData.id) {
            let res = await fetch(STATS_API, {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify(data)
            });
            statsData = await res.json();
        } else {
            await fetch(`${STATS_API}/${statsData.id}`, {
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify(data)
            });
            statsData = {...statsData, ...data};
        }

        renderStats();
        updateCounts();
        alert("تم حفظ البيانات وتحديث الرسوم البيانية بنجاح ✔");
    } catch (e) {
        alert("فشل حفظ البيانات الجغرافية");
    }
}

// تشغيل النظام تلقائياً
loadData();
</script>

</body>
</html>
